<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Test QZ</title>

<script src="https://cdn.jsdelivr.net/npm/qz-tray/qz-tray.js"></script>

</head>
<body>

<h1>Test conexión QZ</h1>

<script>

console.log("SCRIPT CARGADO");

qz.websocket.connect().then(function() {

  console.log(printers);

}).catch(function(err){

  console.error("Error:", err);

});

</script>
