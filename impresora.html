<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Servidor de Impresión</title>

<script src="https://cdn.jsdelivr.net/npm/qz-tray/qz-tray.js"></script>

</head>
<body>

<h2>🖨 Servidor de impresión activo</h2>
<p>Esperando pedidos...</p>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

/* FIREBASE */
const firebaseConfig = {
  apiKey: "...",
  authDomain: "app-vera-alba.firebaseapp.com",
  databaseURL: "https://app-vera-alba-default-rtdb.firebaseio.com/",
  projectId: "app-vera-alba",
  storageBucket: "app-vera-alba.appspot.com",
  messagingSenderId: "...",
  appId: "..."
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* CONECTAR QZ */

async function conectarQZ(){

  try{

    if(!qz.websocket.isActive()){
      await qz.websocket.connect();
      console.log("✅ QZ conectado correctamente");
    }

    /* MOSTRAR IMPRESORAS */
    const printers = await qz.printers.find();
    console.log("🖨 Impresoras detectadas:", printers);

  }catch(err){

    console.error("❌ Error conectando QZ:", err);

  }

}

/* IMPRIMIR */

async function imprimirTicket(pedido){

  await conectarQZ();

  const printerName = "POS-58"; // cambiar luego si hace falta
  console.log("Usando impresora:", printerName);

  const config = qz.configs.create(printerName);

  let ticket = `
VERA ALBA
--------------------------
Cliente: ${pedido.cliente}

`;

  pedido.productos.forEach(p => {
    ticket += `${p.cantidad} x ${p.nombre}\n`;
  });

  ticket += `
--------------------------
TOTAL: $${pedido.totalPedido}

Gracias por su compra


`;

  const data = [{
    type: 'raw',
    format: 'plain',
    data: ticket
  }];

  try{

    await qz.print(config, data);
    console.log("✅ Ticket enviado a imprimir");

  }catch(err){

    console.error("❌ Error al imprimir:", err);

  }

}

/* INICIAR CONEXION QZ AL CARGAR */

conectarQZ();

/* ESCUCHAR PEDIDOS */

const pedidosRef = ref(db, "pedidosActuales");

onValue(pedidosRef, snapshot => {

  snapshot.forEach(pedidoSnap => {

    const pedido = pedidoSnap.val();

    if(pedido.imprimir === true){

      console.log("🧾 Imprimiendo pedido", pedido);

      imprimirTicket(pedido);

      update(pedidoSnap.ref,{
        imprimir:false
      });

    }

  });

});

</script>

</body>
</html>
